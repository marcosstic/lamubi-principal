<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LA MUBI — Login Licor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles/variables.css" />
  <link rel="stylesheet" href="/src/styles/base.css" />
  <link rel="stylesheet" href="/src/styles/layout.css" />
  <link rel="stylesheet" href="/src/styles/components.css" />
  <link rel="stylesheet" href="/src/styles/animations.css" />
  <link rel="stylesheet" href="/src/styles/responsive.css" />
  <link rel="stylesheet" href="/src/styles/licor.css" />
</head>
<body>
  <header class="header" role="banner">
    <div class="container header__inner">
      <a class="brand" href="/licor/index.html" aria-label="LA MUBI">
        <img class="brand__logo" src="/LaMubiMCBOLogo1.png" alt="LA MUBI" />
      </a>
      <nav class="nav" aria-label="Licor">
        <a class="nav__link" data-nav-link href="/licor/tienda.html">Tienda</a>
        <a class="nav__link" data-nav-link href="/licor/mi-cuenta.html">Mi cuenta</a>
        <a class="nav__link" data-nav-link href="/licor/mesas.html">Mesas</a>
      </nav>
      <div class="header__ctas">
        <a class="btn btn--secondary" href="/">Volver</a>
      </div>
      <button class="menu-btn" type="button" aria-label="Abrir menú" aria-expanded="false" data-menu-btn>
        <span class="menu-btn__bars" aria-hidden="true"></span>
      </button>
    </div>
    <div class="mobile-nav" data-mobile-nav>
      <div class="mobile-nav__panel">
        <a class="mobile-nav__link" href="/licor/tienda.html">Tienda</a>
        <a class="mobile-nav__link" href="/licor/mi-cuenta.html">Mi cuenta</a>
        <a class="mobile-nav__link" href="/licor/mesas.html">Mesas</a>
        <div class="mobile-nav__ctas">
          <a class="btn btn--secondary btn--block" href="/">Volver</a>
        </div>
      </div>
    </div>
  </header>

  <main class="page" id="main">
    <section class="container">
      <div class="page__header" style="margin-bottom:1rem">
        <div>
          <h1 class="page__title">Iniciar sesión</h1>
          <p class="page__subtitle">Accede a tu cuenta para ver tus órdenes y QR.</p>
        </div>
      </div>

      <div class="card" style="max-width:560px">
        <form class="form" data-login-form>
          <div class="field">
            <div class="label">Email</div>
            <input class="input" name="email" type="email" autocomplete="email" placeholder="tu@email.com" required />
          </div>
          <div class="field" style="margin-top:1rem">
            <div class="label">Contraseña</div>
            <input class="input" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required />
          </div>
          <div style="display:flex;gap:.75rem;flex-wrap:wrap;margin-top:1rem">
            <button class="btn btn--primary" type="submit">Entrar</button>
            <a class="btn btn--secondary" href="/licor/tienda.html">Ver catálogo</a>
          </div>
          <p class="help" style="margin-top:1rem"><a href="#" data-reset-pass>¿Olvidaste tu contraseña?</a></p>
          <p class="help" style="margin-top:1rem">¿No tienes cuenta? <a href="/licor/registro.html">Crear cuenta</a></p>
        </form>
      </div>
    </section>
  </main>

  <div class="toast-root" data-toast-root></div>

  <script src="/src/js/main.js" type="module"></script>
  <script src="/src/js/licor/app.js" type="module"></script>
</body>
</html>
