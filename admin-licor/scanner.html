<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>LA MUBI — Scanner QR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles/variables.css" />
  <link rel="stylesheet" href="/src/styles/base.css" />
  <link rel="stylesheet" href="/src/styles/layout.css" />
  <link rel="stylesheet" href="/src/styles/components.css" />
  <link rel="stylesheet" href="/src/styles/animations.css" />
  <link rel="stylesheet" href="/src/styles/responsive.css" />
  <link rel="stylesheet" href="/src/styles/licor.css" />
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    .scanner-container { max-width: 500px; margin: 0 auto; padding: 1rem; }
    .scanner-header { text-align: center; margin-bottom: 1.5rem; }
    .scanner-header h1 { font-size: 1.5rem; margin: 0 0 0.5rem; }
    .scanner-header p { opacity: 0.7; margin: 0; font-size: 0.9rem; }
    #qr-reader { border-radius: 16px; overflow: hidden; margin-bottom: 1rem; }
    #qr-reader video { border-radius: 16px; }
    .btn-scan { width: 100%; padding: 1rem; font-size: 1.1rem; font-weight: 700; border-radius: 12px; border: none; cursor: pointer; margin-bottom: 1rem; }
    .btn-scan.start { background: linear-gradient(45deg, var(--primary), var(--secondary)); color: white; }
    .btn-scan.stop { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
    .result-card { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 1rem; margin-bottom: 1rem; border: 1px solid rgba(255,255,255,0.1); }
    .result-card.success { border-color: #11bb75; }
    .result-card.error { border-color: #f44336; }
    .result-card .icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .result-card .message { font-weight: 700; font-size: 1.1rem; margin-bottom: 0.5rem; }
    .result-card .details { font-size: 0.85rem; opacity: 0.8; }
    .history-item { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 0.75rem; margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; }
    .history-item .time { font-size: 0.75rem; opacity: 0.6; }
    .badge-valid { background: #11bb75; color: white; padding: 0.25rem 0.5rem; border-radius: 999px; font-size: 0.75rem; font-weight: 700; }
    .badge-invalid { background: #f44336; color: white; padding: 0.25rem 0.5rem; border-radius: 999px; font-size: 0.75rem; font-weight: 700; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <header class="header" role="banner">
    <div class="container header__inner">
      <a class="brand" href="/" aria-label="LA MUBI">
        <img class="brand__logo" src="/LaMubiMCBOLogo1.png" alt="LA MUBI" />
      </a>
      <nav class="nav" aria-label="Admin Licor">
        <a class="nav__link" data-nav-link href="/admin-licor/index.html">Dashboard</a>
        <a class="nav__link" data-nav-link href="/admin-licor/scanner.html">Scanner</a>
      </nav>
      <div class="header__ctas">
        <span class="badge"><span style="opacity:.75">@</span> <span data-admin-email></span></span>
        <a class="btn btn--secondary" data-admin-logout href="#">Salir</a>
      </div>
      <button class="menu-btn" type="button" aria-label="Abrir menú" aria-expanded="false" data-menu-btn>
        <span class="menu-btn__bars" aria-hidden="true"></span>
      </button>
    </div>
    <div class="mobile-nav" data-mobile-nav>
      <div class="mobile-nav__panel">
        <a class="mobile-nav__link" href="/admin-licor/index.html">Dashboard</a>
        <a class="mobile-nav__link" href="/admin-licor/scanner.html">Scanner</a>
        <div class="mobile-nav__ctas">
          <a class="btn btn--secondary btn--block" data-admin-logout href="#">Salir</a>
        </div>
      </div>
    </div>
  </header>

  <main class="page" id="main" data-require-admin>
    <div class="scanner-container">
      <div class="scanner-header">
        <h1>Scanner QR</h1>
        <p>Escanea el QR del comprador para validar su orden</p>
      </div>

      <button class="btn-scan start" id="btn-toggle-scan">📷 Iniciar Scanner</button>

      <div style="text-align: center; margin: 0.5rem 0;">
        <button id="btn-switch-camera" class="btn-scan" style="display: none; width: auto; padding: 0.5rem 1rem; font-size: 0.9rem; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: white; cursor: pointer;">
          🔄 Cambiar Cámara
        </button>
      </div>

      <div id="qr-reader" class="hidden"></div>

      <div id="result-container"></div>

      <div style="margin-top: 1.5rem;">
        <h3 style="font-size: 1rem; margin-bottom: 0.75rem;">Historial de Escaneos</h3>
        <div id="scan-history"></div>
      </div>

      <!-- Debug Panel -->
      <div style="margin-top: 2rem; padding: 1rem; background: #f5f5f5; border-radius: 12px; border: 1px solid #ddd;">
        <h3 style="font-size: 0.9rem; margin: 0 0 0.5rem; color: #333;">🔧 Debug Console</h3>
        <div id="debug-console" style="font-family: monospace; font-size: 0.75rem; color: #000; background: #fff; padding: 0.5rem; border-radius: 8px; height: 150px; overflow-y: auto; white-space: pre-wrap; border: 1px solid #ccc;"></div>
        <button id="clear-debug" style="margin-top: 0.5rem; padding: 0.25rem 0.5rem; font-size: 0.75rem; background: #007bff; border: none; border-radius: 4px; color: white; cursor: pointer;">Limpiar</button>
      </div>
    </div>
  </main>

  <div class="toast-root" data-toast-root></div>

  <script src="/src/js/main.js" type="module"></script>
  <script src="/src/js/admin-licor/app.js" type="module"></script>
</body>
</html>
